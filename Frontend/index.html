<!doctype html>
<html lang="en">
<head>

  <!-- Basic Meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Title -->
  <title>
    Best PR & Digital Marketing Company in Aligarh | BrandsWay
  </title>

  <!-- SEO Description -->
  <meta
    name="description"
    content="BrandsWay is a leading PR and digital marketing agency in Aligarh helping brands grow with social media marketing, PR campaigns, influencer marketing and strategic branding."
  />

  <!-- Keywords -->
  <meta
    name="keywords"
    content="digital marketing agency Aligarh, PR agency Aligarh, social media marketing Aligarh, branding agency Aligarh, influencer marketing Aligarh"
  />

  <meta name="author" content="BrandsWay" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://thebrandsway.com/" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logo/brandsway.png" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#000000">

  <!-- Open Graph SEO -->
  <meta property="og:title" content="Best PR & Digital Marketing Company in Aligarh | BrandsWay" />
  <meta property="og:description" content="Leading PR and digital marketing agency in Aligarh helping brands grow through strategic campaigns and social media marketing." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://thebrandsway.com/" />
  <meta property="og:image" content="https://thebrandsway.com/logo/brandsway.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Best PR & Digital Marketing Company in Aligarh | BrandsWay" />
  <meta name="twitter:description" content="PR campaigns, social media marketing and branding services helping businesses grow." />
  <meta name="twitter:image" content="https://thebrandsway.com/logo/brandsway.png" />

  <!-- Preconnect for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonts -->
  <link
    rel="preload"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  >
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  </noscript>

  <link
    rel="preload"
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&display=swap"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  >

  <!-- Preload Logo -->
  <link rel="preload" href="/logo/brandsway.png" as="image">

  <!-- Local Business Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MarketingAgency",
    "name": "BrandsWay",
    "url": "https://thebrandsway.com",
    "logo": "https://thebrandsway.com/logo/brandsway.png",
    "description": "BrandsWay is a digital marketing and PR agency helping brands grow with social media marketing, PR campaigns, influencer marketing and branding.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Aligarh",
      "addressCountry": "India"
    },
    "sameAs": [
      "https://www.linkedin.com",
      "https://www.instagram.com"
    ]
  }
  </script>

</head>

<body>

  <div id="root"></div>

  <!-- Main React Entry -->
  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
